<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wise Owl Uniforms | Inventory Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #fccf09;
            --primary-dark: #e0b800;
            --primary-light: #fff8e7;
            --secondary: #2c2c2c;
            --success: #2e7d32;
            --warning: #ed6c02;
            --danger: #d32f2f;
            --info: #0288d1;
            --text-primary: #1e1e1e;
            --text-secondary: #5f5f5f;
            --border: #e5e7eb;
            --bg-page: #f9fafb;
            --card-bg: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-logo {
            margin-bottom: 28px;
        }

        .login-logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--secondary);
        }

        .login-card p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* App Layout */
        .app-container {
            display: none;
            min-height: 100vh;
            flex-direction: column;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area img {
            height: 42px;
            width: auto;
        }

        .logo-area span {
            font-weight: 600;
            font-size: 18px;
            color: var(--secondary);
            letter-spacing: -0.2px;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-light);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--secondary);
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--border);
            color: var(--danger);
        }

        /* Main Content */
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
            width: 100%;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 20px 18px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: transform 0.1s ease;
        }

        .stat-card h4 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--secondary);
            line-height: 1.2;
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 24px 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            letter-spacing: -0.2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            margin-top: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.2s;
            background: var(--card-bg);
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(252, 207, 9, 0.15);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--secondary);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* Search & Filter */
        .search-bar {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 16px 20px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .search-field {
            flex: 2;
            min-width: 200px;
        }

        .filter-field {
            flex: 1;
            min-width: 160px;
        }

        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 18px 20px;
            background: var(--primary-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .product-title {
            font-weight: 700;
            font-size: 18px;
            color: var(--secondary);
        }

        .supplier-tag {
            font-size: 12px;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .card-body {
            padding: 16px 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .stock-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        .stock-normal {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stock-low {
            background: #fff3e0;
            color: #ed6c02;
        }

        .stock-out {
            background: #ffebee;
            color: #d32f2f;
        }

        /* Expanded Section */
        .product-expanded {
            display: none;
            padding: 16px 20px 20px;
            background: var(--bg-page);
            border-top: 1px solid var(--border);
        }

        .product-card.expanded .product-expanded {
            display: block;
        }

        .comment-history {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 18px;
            background: white;
            border-radius: var(--radius-sm);
            padding: 8px;
        }

        .comment-item {
            background: var(--card-bg);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            border: 1px solid var(--border);
            font-size: 13px;
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .inline-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 16px;
            align-items: center;
        }

        .qty-input {
            width: 100px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .comment-input-area {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .comment-input-area textarea {
            flex: 3;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            resize: vertical;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-container {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 480px;
            padding: 28px;
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 800px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .main-wrapper {
                padding: 20px 16px;
            }
            .top-nav {
                padding: 0 20px;
            }
        }

        @media (max-width: 560px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <img src="logo.png" alt="Wise Owl Primary School Marondera" onerror="this.style.display='none'">
        </div>
        <h2>Inventory Management</h2>
        <p>Wise Owl Uniforms Department</p>
        <form id="loginForm">
            <div class="input-group" style="margin-bottom: 18px;">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="off">
            </div>
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
            <p style="font-size: 12px; margin-top: 20px; color: var(--text-secondary);">version 1</p>
        </form>
    </div>
</div>

<!-- MAIN APPLICATION -->
<div id="appContainer" class="app-container">
    <div class="top-nav">
        <div class="logo-area">
            <img src="logo.png" alt="Wise Owl" onerror="this.style.display='none'">
            <span>Wise Owl Uniforms</span>
        </div>
        <div class="user-panel">
            <div class="user-badge">
                <div class="avatar" id="userAvatar">A</div>
                <span id="userName">Admin</span>
            </div>
            <button id="logoutBtn" class="logout-btn">Sign out</button>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- STATISTICS -->
        <div class="stats-grid">
            <div class="stat-card"><h4>Total Products</h4><div class="stat-number" id="totalProducts">0</div></div>
            <div class="stat-card"><h4>Inventory Value (USD)</h4><div class="stat-number" id="totalValue">$0</div></div>
            <div class="stat-card"><h4>Active Suppliers</h4><div class="stat-number" id="totalSuppliers">0</div></div>
            <div class="stat-card"><h4>Low Stock Items</h4><div class="stat-number" id="lowStockCount">0</div></div>
        </div>

        <!-- ADD PRODUCT FORM -->
        <div class="form-card">
            <div class="section-title">Register New Product</div>
            <form id="addProductForm">
                <div class="form-grid">
                    <div class="input-group"><label>Product name *</label><input type="text" id="productName" placeholder="e.g., Primary Tracksuit" required></div>
                    <div class="input-group"><label>Supplier *</label><input type="text" id="supplierName" placeholder="e.g., Daisy Clothing" required></div>
                    <div class="input-group"><label>Quantity *</label><input type="number" id="quantity" value="0" min="0" required></div>
                    <div class="input-group"><label>Unit Cost (USD) *</label><input type="number" id="unitCost" step="0.01" value="0" min="0" required></div>
                    <div class="input-group" style="grid-column: span 2;"><label>Description (size, colour, notes)</label><textarea id="description" rows="2" placeholder="Specifications, sizing, material..."></textarea></div>
                </div>
                <div style="margin-top: 20px;"><button type="submit" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Add Product</button></div>
            </form>
        </div>

        <!-- SEARCH & FILTER -->
        <div class="search-bar">
            <div class="search-field"><input type="text" id="searchInput" placeholder="Search by product name or supplier" class="qty-input" style="width:100%;"></div>
            <div class="filter-field"><select id="supplierFilter" class="qty-input" style="width:100%;"><option value="">All suppliers</option></select></div>
        </div>

        <!-- PRODUCTS GRID -->
        <div id="productsGrid" class="products-grid"></div>
    </div>
</div>

<script>
    // ---------------------------- IndexedDB Setup ----------------------------
    let db = null;
    let currentUser = { username: "admin" };
    let products = [];

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("WiseOwlUniformsDB", 3);
            request.onerror = () => reject(request.error);
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onupgradeneeded = (e) => {
                const dbInstance = e.target.result;
                if (!dbInstance.objectStoreNames.contains("products")) {
                    const productStore = dbInstance.createObjectStore("products", { keyPath: "id", autoIncrement: true });
                    productStore.createIndex("supplier", "supplier", { unique: false });
                    productStore.createIndex("productName", "productName", { unique: false });
                }
                if (!dbInstance.objectStoreNames.contains("comments")) {
                    const commentStore = dbInstance.createObjectStore("comments", { keyPath: "id", autoIncrement: true });
                    commentStore.createIndex("productId", "productId", { unique: false });
                    commentStore.createIndex("timestamp", "timestamp", { unique: false });
                }
                if (!dbInstance.objectStoreNames.contains("transactions")) {
                    const transStore = dbInstance.createObjectStore("transactions", { keyPath: "id", autoIncrement: true });
                    transStore.createIndex("productId", "productId", { unique: false });
                }
            };
        });
    }

    async function loadProductsFromDB() {
        return new Promise((resolve) => {
            const tx = db.transaction("products", "readonly");
            const store = tx.objectStore("products");
            const req = store.getAll();
            req.onsuccess = () => { products = req.result || []; resolve(products); };
            req.onerror = () => { products = []; resolve([]); };
        });
    }

    async function saveProductToDB(product) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction("products", "readwrite");
            const req = tx.objectStore("products").add(product);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function updateProductInDB(product) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction("products", "readwrite");
            const req = tx.objectStore("products").put(product);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    }

    async function deleteProductFromDB(productId) {
        return new Promise((resolve) => {
            const tx = db.transaction(["products", "comments", "transactions"], "readwrite");
            tx.objectStore("products").delete(productId);
            const commentIdx = tx.objectStore("comments").index("productId");
            commentIdx.getAll(IDBKeyRange.only(productId)).onsuccess = (e) => {
                e.target.result.forEach(c => tx.objectStore("comments").delete(c.id));
            };
            const transIdx = tx.objectStore("transactions").index("productId");
            transIdx.getAll(IDBKeyRange.only(productId)).onsuccess = (e) => {
                e.target.result.forEach(t => tx.objectStore("transactions").delete(t.id));
            };
            tx.oncomplete = () => resolve();
        });
    }

    async function addCommentToProduct(productId, text, actionType = "comment") {
        const comment = { productId, text, timestamp: new Date().toISOString(), user: currentUser.username, actionType };
        return new Promise((resolve) => {
            const tx = db.transaction("comments", "readwrite");
            tx.objectStore("comments").add(comment);
            tx.oncomplete = () => resolve();
        });
    }

    async function getCommentsForProduct(productId) {
        return new Promise((resolve) => {
            const tx = db.transaction("comments", "readonly");
            const idx = tx.objectStore("comments").index("productId");
            const req = idx.getAll(IDBKeyRange.only(productId));
            req.onsuccess = () => {
                const list = req.result || [];
                list.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                resolve(list);
            };
        });
    }

    async function recordTransaction(productId, type, qtyChange, newQty, reason) {
        const txRecord = { productId, type, quantityChange: qtyChange, newQuantity: newQty, reason, timestamp: new Date().toISOString(), user: currentUser.username };
        return new Promise((resolve) => {
            const tx = db.transaction("transactions", "readwrite");
            tx.objectStore("transactions").add(txRecord);
            tx.oncomplete = () => resolve();
        });
    }

    // ---------------------------- UI Helpers ----------------------------
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function updateStatistics() {
        document.getElementById("totalProducts").innerText = products.length;
        const totalVal = products.reduce((sum, p) => sum + (p.quantity * p.unitCost), 0);
        document.getElementById("totalValue").innerText = `$${totalVal.toFixed(2)}`;
        const uniqueSupp = new Set(products.map(p => p.supplier)).size;
        document.getElementById("totalSuppliers").innerText = uniqueSupp;
        const low = products.filter(p => p.quantity > 0 && p.quantity < 20).length;
        document.getElementById("lowStockCount").innerText = low;
        
        const supplierSelect = document.getElementById("supplierFilter");
        const currentVal = supplierSelect.value;
        supplierSelect.innerHTML = '<option value="">All suppliers</option>';
        [...new Set(products.map(p => p.supplier))].sort().forEach(s => {
            supplierSelect.innerHTML += `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`;
        });
        if (currentVal) supplierSelect.value = currentVal;
    }

    async function renderProductCards() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const supplierFilter = document.getElementById("supplierFilter").value;
        let filtered = products.filter(p => 
            (!searchTerm || p.productName.toLowerCase().includes(searchTerm) || p.supplier.toLowerCase().includes(searchTerm)) &&
            (!supplierFilter || p.supplier === supplierFilter)
        );
        const container = document.getElementById("productsGrid");
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open" style="font-size: 40px; margin-bottom: 12px; opacity:0.6;"></i><h3>No products found</h3><p>Add your first product or adjust filters.</p></div>`;
            return;
        }
        container.innerHTML = "";
        for (const prod of filtered) {
            const comments = await getCommentsForProduct(prod.id);
            const latest = comments.length ? comments[0] : null;
            let stockClass = "stock-normal";
            let stockLabel = `${prod.quantity} units`;
            if (prod.quantity <= 0) { stockClass = "stock-out"; stockLabel = "Out of stock"; }
            else if (prod.quantity < 20) { stockClass = "stock-low"; stockLabel = `Low stock (${prod.quantity})`; }
            
            const cardDiv = document.createElement("div");
            cardDiv.className = "product-card";
            cardDiv.setAttribute("data-id", prod.id);
            cardDiv.innerHTML = `
                <div class="card-header" onclick="toggleCardExpand(${prod.id})">
                    <div><div class="product-title">${escapeHtml(prod.productName)}</div><div class="supplier-tag" style="margin-top:6px;">${escapeHtml(prod.supplier)}</div></div>
                    <div><span class="stock-badge ${stockClass}">${stockLabel}</span></div>
                </div>
                <div class="card-body">
                    <div class="info-row"><span>Quantity</span><strong>${prod.quantity} pcs</strong></div>
                    <div class="info-row"><span>Unit cost</span><strong>$${prod.unitCost.toFixed(2)}</strong></div>
                    <div class="info-row"><span>Total value</span><strong>$${(prod.quantity * prod.unitCost).toFixed(2)}</strong></div>
                    ${prod.description ? `<div class="info-row"><span>Description</span><span style="text-align:right; max-width:60%;">${escapeHtml(prod.description)}</span></div>` : ''}
                    ${latest ? `<div class="info-row"><span>Latest note</span><span style="font-size:12px;">${escapeHtml(latest.text.substring(0,55))}</span></div>` : ''}
                </div>
                <div class="product-expanded" id="expanded-${prod.id}">
                    <div class="comment-history" id="commentsList-${prod.id}"><div style="padding:12px; text-align:center;">Loading history...</div></div>
                    <div class="inline-controls">
                        <input type="number" id="addQty-${prod.id}" class="qty-input" placeholder="+ Add qty" min="0" step="1" value="">
                        <button class="btn btn-sm btn-outline" onclick="updateProductQuantity(${prod.id}, 'add')"><i class="fas fa-plus"></i> Add stock</button>
                        <input type="number" id="removeQty-${prod.id}" class="qty-input" placeholder="- Remove qty" min="0" step="1" value="">
                        <button class="btn btn-sm btn-outline" onclick="updateProductQuantity(${prod.id}, 'remove')"><i class="fas fa-minus"></i> Remove stock</button>
                    </div>
                    <div class="comment-input-area">
                        <textarea id="quickComment-${prod.id}" rows="1" placeholder="Write an update (e.g., Arriving tomorrow, Delayed, Quality issue)"></textarea>
                        <button class="btn btn-primary btn-sm" onclick="addQuickComment(${prod.id})"><i class="fas fa-comment"></i> Add comment</button>
                    </div>
                    <div style="margin-top: 12px; text-align:right;">
                        <button class="btn btn-sm btn-outline" style="border-color: #ffcdd2; color:#d32f2f;" onclick="deleteProductConfirm(${prod.id})"><i class="fas fa-trash-alt"></i> Delete product</button>
                    </div>
                </div>
            `;
            container.appendChild(cardDiv);
            await loadCommentsIntoCard(prod.id);
        }
    }

    async function loadCommentsIntoCard(productId) {
        const comments = await getCommentsForProduct(productId);
        const container = document.getElementById(`commentsList-${productId}`);
        if (!container) return;
        if (comments.length === 0) {
            container.innerHTML = `<div style="padding: 12px; color: var(--text-secondary); text-align:center;">No comments yet. Add your first update.</div>`;
            return;
        }
        container.innerHTML = comments.map(c => `
            <div class="comment-item">
                <div class="comment-meta"><span><i class="far fa-clock"></i> ${new Date(c.timestamp).toLocaleString()}</span><span>${escapeHtml(c.user)}</span></div>
                <div>${escapeHtml(c.text)}</div>
            </div>
        `).join('');
    }

    window.toggleCardExpand = function(id) {
        const card = document.querySelector(`.product-card[data-id="${id}"]`);
        if (card) card.classList.toggle("expanded");
    };

    window.updateProductQuantity = async function(productId, action) {
        const prod = products.find(p => p.id === productId);
        if (!prod) return;
        const addInput = document.getElementById(`addQty-${productId}`);
        const removeInput = document.getElementById(`removeQty-${productId}`);
        let delta = 0;
        let reason = "";
        if (action === "add") {
            delta = parseInt(addInput.value) || 0;
            if (delta <= 0) { alert("Enter a valid quantity to add."); return; }
            reason = prompt("Reason for adding stock:", "New delivery");
            if (reason === null) return;
            prod.quantity += delta;
            addInput.value = "";
        } else {
            delta = parseInt(removeInput.value) || 0;
            if (delta <= 0) { alert("Enter a valid quantity to remove."); return; }
            if (delta > prod.quantity) { alert(`Not enough stock. Available: ${prod.quantity}`); return; }
            reason = prompt("Reason for removal:", "Sold / Damaged / Return");
            if (reason === null) return;
            prod.quantity -= delta;
            removeInput.value = "";
        }
        await updateProductInDB(prod);
        await recordTransaction(productId, action, delta, prod.quantity, reason);
        await addCommentToProduct(productId, `${action === 'add' ? 'Stock added' : 'Stock removed'}: ${delta} units. Reason: ${reason || "Manual update"}`, "stock_change");
        await loadProductsFromDB();
        await renderProductCards();
        updateStatistics();
    };

    window.addQuickComment = async function(productId) {
        const textarea = document.getElementById(`quickComment-${productId}`);
        const commentText = textarea.value.trim();
        if (!commentText) { alert("Please write a comment before submitting."); return; }
        await addCommentToProduct(productId, commentText, "status_update");
        textarea.value = "";
        await loadCommentsIntoCard(productId);
        await renderProductCards(); // refresh last comment preview
    };

    window.deleteProductConfirm = async function(productId) {
        if (confirm("Permanently delete this product and all its history?")) {
            await deleteProductFromDB(productId);
            await loadProductsFromDB();
            await renderProductCards();
            updateStatistics();
        }
    };

    // ---------------------------- FORM HANDLERS ----------------------------
    document.getElementById("addProductForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const productName = document.getElementById("productName").value.trim();
        const supplier = document.getElementById("supplierName").value.trim();
        const quantity = parseInt(document.getElementById("quantity").value) || 0;
        const unitCost = parseFloat(document.getElementById("unitCost").value) || 0;
        const description = document.getElementById("description").value.trim();
        if (!productName || !supplier) { alert("Product name and supplier are required."); return; }
        const newProduct = { productName, supplier, quantity, unitCost, description, createdAt: new Date().toISOString() };
        const newId = await saveProductToDB(newProduct);
        newProduct.id = newId;
        await addCommentToProduct(newId, `Product created. Initial stock: ${quantity} units at $${unitCost} each.`, "create");
        await recordTransaction(newId, "create", quantity, quantity, "Initial inventory");
        await loadProductsFromDB();
        await renderProductCards();
        updateStatistics();
        document.getElementById("addProductForm").reset();
    });

    document.getElementById("searchInput").addEventListener("input", () => renderProductCards());
    document.getElementById("supplierFilter").addEventListener("change", () => renderProductCards());

    // ---------------------------- AUTHENTICATION ----------------------------
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        if ((user === "admin" && pass === "123") || (user === "user" && pass === "user123")) {
            currentUser = { username: user, role: user === "admin" ? "admin" : "user" };
            document.getElementById("userAvatar").innerText = user.charAt(0).toUpperCase();
            document.getElementById("userName").innerText = user;
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "flex";
            await initDB();
            await loadProductsFromDB();
            await renderProductCards();
            updateStatistics();
        } else {
            alert("Invalid credentials. Use admin/admin123");
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("appContainer").style.display = "none";
        if (db) db.close();
    });
</script>
</body>
</html>
